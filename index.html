<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Upload File Cute Edition 🎀</title>
    <style>
        /* Reset Dasar & Tema Warna */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f5;
            /* Lavender Blush (Pink Sangat Muda) */
            background-image: radial-gradient(#ffb6c1 0.5px, transparent 0.5px), radial-gradient(#ffb6c1 0.5px, #fff0f5 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            /* Pola dot imut di background */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Card Utama Upload */
        .card-upload {
            max-width: 450px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            border: 3px solid #ffb6c1;
            overflow: hidden;
        }

        /* Bagian Header Card */
        .card-header {
            background: linear-gradient(135deg, #ffb6c1, #ff69b4);
            padding: 24px;
            color: #ffffff;
            text-align: center;
        }

        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-header p {
            color: #fff0f5;
            font-size: 0.75rem;
            opacity: 0.9;
        }

        /* Bagian Body Form */
        .card-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #c71585;
            margin-bottom: 10px;
        }

        /* Area Pilih Berkas Kastem */
        .file-drop-zone {
            border: 3px dashed #ffb6c1;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            background-color: #fff9fa;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-drop-zone:hover {
            background-color: #fff0f5;
            border-color: #ff69b4;
        }

        .file-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .file-drop-zone input[type="file"] {
            width: 100%;
            font-size: 0.8rem;
            color: #c71585;
            cursor: pointer;
        }

        /* Tombol Unggah Berkas Pink */
        .btn-upload {
            display: block;
            width: 100%;
            background-color: #ff69b4;
            color: #ffffff;
            font-weight: 700;
            padding: 14px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
        }

        .btn-upload:hover {
            background-color: #ff1493;
            transform: translateY(-1px);
        }

        .btn-upload:active {
            transform: translateY(1px);
        }

        /* Footer Bawah Card */
        .card-footer {
            background-color: #fff9fa;
            padding: 16px;
            border-top: 1px solid #ffe4e1;
            text-align: center;
            font-size: 11px;
            color: #ffb6c1;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="card-upload">
        <div class="card-header">
            <h2>🎀 Uploader Portal</h2>
            <p>Pilih dan kirimkan berkas kamu ke server aman</p>
        </div>

        <div class="card-body">
            <form action="upload.php" method="post" enctype="multipart/form-data">

                <div class="form-group">
                    <label>Pilih Berkas Target:</label>
                    <div class="file-drop-zone">
                        <span class="file-icon">✨</span>
                        <input type="file" name="fileToUpload" id="fileToUpload" required />
                    </div>
                </div>

                <button type="submit" name="submit" class="btn-upload">
                    Unggah Berkas Sekarang 💕
                </button>
            </form>
        </div>

        <div class="card-footer">
            🐾 Silakan periksa kembali ekstensi berkas sebelum diunggah
        </div>
    </div>

</body>

</html>
